[build]
  command = "npm run build"
  publish = "build"

# Serve trailing-slash URLs directly instead of 301-redirecting to the no-slash
# form. Preserves old Hugo-era inbound links (/funny-week/) without the extra
# round-trip. status = 200 means rewrite, not redirect.
[[redirects]]
  from = "/*/"
  to = "/:splat"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    Link = "</sitemap.xml>; rel=\"sitemap\""
    # Cache everything for 2h. Repeat visitors get fresh content within 2h of
    # an edit (the ETag-based revalidation handshake still works for sub-2h
    # cache busting on hard reloads). Uniform policy across HTML, RSS, sitemap,
    # static assets, and SvelteKit's content-hashed /_app/immutable/* chunks.
    Cache-Control = "public, max-age=7200, must-revalidate"
