[build]
  command = "npm run build"
  publish = "build"

# Serve trailing-slash URLs directly instead of 301-redirecting to the no-slash
# form. Preserves old Hugo-era inbound links (/funny-week/) without the extra
# round-trip. status = 200 means rewrite, not redirect.
[[redirects]]
  from = "/*/"
  to = "/:splat"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    Link = "</sitemap.xml>; rel=\"sitemap\""
