[build]
  command = "curl -sSL https://github.com/jgm/pandoc/releases/download/3.5/pandoc-3.5-linux-amd64.tar.gz | tar -xz -C /tmp --strip-components=1 && PATH=/tmp/bin:$PATH make"
  publish = "public"

# Serve trailing-slash URLs directly instead of 301-redirecting to the no-slash
# form. Preserves old Hugo-era inbound links (/funny-week/) without the extra
# round-trip. status = 200 means rewrite, not redirect.
[[redirects]]
  from = "/*/"
  to = "/:splat"
  status = 200
  force = true
